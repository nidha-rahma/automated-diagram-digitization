version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: clickflow_db
    environment:
      POSTGRES_USER: clickflow
      POSTGRES_PASSWORD: clickflow_secret
      POSTGRES_DB: clickflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clickflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clickflow_backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://clickflow:clickflow_secret@db:5432/clickflow
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clickflow_frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
